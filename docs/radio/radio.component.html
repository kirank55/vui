<fieldset class="vui-radio-group">
  <legend class="vui-radio-legend">Release track</legend>

  <div class="vui-radio-row">
    <label class="vui-radio">
      <input type="radio" name="track" checked />
      <span>Private beta</span>
    </label>

    <label class="vui-radio">
      <input type="radio" name="track" />
      <span>Public launch</span>
    </label>

    <label class="vui-radio">
      <input type="radio" name="track" disabled />
      <span>Internal dry run</span>
    </label>
  </div>
</fieldset>
