<!--
  vui Animated Icon
  Inline SVG with SMIL hover animation. No CSS, no JS.
  begin="mouseover" fires on the svg element itself.
  Source: https://github.com/kirank55/vui
-->
<svg class="vui-icon-button" viewBox="0 0 24 24" aria-label="Open menu" role="img">
  <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
    d="m6 9 6 6 6-6" />
  <animateTransform attributeName="transform" type="rotate" values="0 12 12; 90 12 12; 0 12 12" keyTimes="0; 0.5; 1"
    dur="1s" begin="mouseover" fill="freeze" />
</svg>
