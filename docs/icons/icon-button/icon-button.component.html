<!--
  vui Icon Button
  Native buttons paired with an inline SVG chevron-down icon from the Icons page.
  Copy the HTML and icon-button.component.css into your project.
  Source: https://github.com/kirank55/vui
-->
<section class="vui-icon-button-demo" aria-label="Icon button examples">
  <div class="vui-icon-button-row">
    <button class="vui-icon-button vui-icon-button--primary" type="button" aria-label="Open menu">
      <svg class="vui-icon-button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
    </button>
    <button class="vui-icon-button vui-icon-button--outline" type="button" aria-label="Expand section">
      <svg class="vui-icon-button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
    </button>
    <button class="vui-icon-button vui-icon-button--ghost" type="button" aria-label="Show more options">
      <svg class="vui-icon-button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
    </button>
  </div>

  <div class="vui-icon-button-row">
    <button class="vui-icon-button vui-icon-button--pill vui-icon-button--outline" type="button">
      Filters
      <svg class="vui-icon-button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
    </button>
    <button class="vui-icon-button vui-icon-button--pill vui-icon-button--primary" type="button">
      Categories
      <svg class="vui-icon-button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
    </button>
  </div>
</section>
