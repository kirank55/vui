<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round" aria-label="copy">
  <g id="copy-g">
    <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
    <g pointer-events="none">
      <rect x="5" y="5" width="10" height="10" rx="2">
        <animateTransform attributeName="transform" type="translate" values="0 0; -2 -2; 0 0"
          dur="0.6s" begin="copy-g.mouseover" calcMode="spline"
          keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      </rect>
    </g>
    <g pointer-events="none">
      <rect x="9" y="9" width="10" height="10" rx="2">
        <animateTransform attributeName="transform" type="translate" values="0 0; 3 3; 0 0"
          dur="0.6s" begin="copy-g.mouseover" calcMode="spline"
          keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      </rect>
    </g>
  </g>
</svg>