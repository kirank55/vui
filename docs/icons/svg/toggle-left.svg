<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="toggle-left">
<g id="toggle-left-g">
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
  <g pointer-events="none">
    <rect  x="1" y="5" width="22" height="14" rx="7" ry="7">
    <animate attributeName="opacity" values="1; 0.7; 1" dur="0.4s" begin="toggle-left-g.mouseover" />
  </rect>
  </g>
  <g pointer-events="none">
    <circle  cx="8" cy="12" r="3">
    <animateTransform attributeName="transform" type="scale" values="1 1; 1.15 1.15; 1 1" transform-origin="8 12" dur="0.5s" begin="toggle-left-g.mouseover" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
  </circle>
  </g>
</g>
</svg>