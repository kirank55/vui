<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="toggle-right">
<g id="toggle-right-g">
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
  
  <rect pointer-events="none" x="1" y="5" width="22" height="14" rx="7" ry="7" />
  <circle pointer-events="none" cx="16" cy="12" r="3">
    <animate attributeName="cx" values="16; 8; 16" dur="0.6s" begin="toggle-right-g.mouseover" />
  </circle>
  <animate attributeName="stroke" values="currentColor; #10b981; currentColor" dur="0.6s" begin="toggle-right-g.mouseover" />

</g>
</svg>