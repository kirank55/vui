<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round" aria-label="eye" id="eyeSvg">
  <g transform="translate(1.5 1.5) scale(0.875)">

  <g>
    <rect  width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
    <!-- outer eye shape: stays still -->
    <path pointer-events="none" d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
    <!-- pupil: slides left, scales up, slides right -->
    <circle pointer-events="none" cx="12" cy="12" r="2.5">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; -3 0; 3 0; 0 0" keyTimes="0; 0.3; 0.7; 1"
        dur="0.7s" begin="eyeSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" />
      <animateTransform attributeName="transform" type="scale"
        values="1 1; 1.2 1.2; 1.2 1.2; 1 1" keyTimes="0; 0.3; 0.7; 1"
        transform-origin="12 12"
        dur="0.7s" begin="eyeSvg.mouseover" fill="freeze" additive="sum"
        calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" />
    </circle>
  </g>

  </g>
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
</svg>