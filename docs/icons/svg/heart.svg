<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round" aria-label="heart" id="heartSvg">
  <g>
    <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
    <!-- Center the coordinate system at the visual center of the heart (12, 13) -->
    <g transform="translate(12 13)">
      <g pointer-events="none">
        <!-- Scale around (0,0) which is now at visual center (12,13) -->
        <animateTransform attributeName="transform" type="scale"
          values="1 1; 1.25 1.25; 1 1" keyTimes="0; 0.5; 1"
          dur="0.4s" begin="heartSvg.mouseover" fill="freeze"
          calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
        <!-- Shift the path back so it draws in the correct original spot -->
        <path transform="translate(-12 -13)"
          d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
      </g>
    </g>
  </g>
</svg>