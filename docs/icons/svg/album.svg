<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="album">
<g id="album-g">
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
  <g pointer-events="none">
    <rect  width="18" height="18" x="3" y="3" rx="2" ry="2">
    <animate attributeName="opacity" values="1; 0.7; 1" dur="0.4s" begin="album-g.mouseover" />
  </rect>
  </g>
  <g pointer-events="none">
    <polyline  points="11 3 11 11 14 8 17 11 17 3" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
    <animate attributeName="stroke-dashoffset" values="1; 0; 0" keyTimes="0; 0.6; 1" dur="0.6s" begin="album-g.mouseover" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" fill="freeze" />
  </polyline>
  </g>
</g>
</svg>