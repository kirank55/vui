<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round" aria-label="search" id="searchSvg">
  <g transform="translate(1.5 1.5) scale(0.875)">

  <g>
    <rect  width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
    <circle pointer-events="none" cx="11" cy="11" r="7" />
    <path pointer-events="none" d="m20 20-3.5-3.5" />
    <!-- dot inside glass: uses r animation to scale up/down, avoiding transform-origin issues -->
    <circle pointer-events="none" cx="11" cy="11" r="0" fill="currentColor" stroke="none">
      <animate attributeName="r" values="0; 2.5; 1.5; 0" keyTimes="0; 0.3; 0.7; 1"
        dur="0.6s" begin="searchSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" />
      <animate attributeName="r" values="1.5; 0" keyTimes="0; 1"
        dur="0.2s" begin="searchSvg.mouseout" fill="freeze"
        calcMode="spline" keySplines="0.4 0 0.2 1" />
    </circle>
  </g>

  </g>
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
</svg>