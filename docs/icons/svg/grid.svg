<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round" aria-label="grid" id="gridSvg">
  <g transform="translate(1.5 1.5) scale(0.875)">

  <g>
    <!-- Hit target overlay for consistent hover area -->
    <rect  width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />

    <!-- Primary tile: scales up to merge the grid shape and back to original -->
    <rect x="3" y="3" width="7" height="7" rx="1" pointer-events="none">
      <animate attributeName="width"
        from="7" dur="0.5s"
        begin="gridSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
        keyTimes="0; 0.6; 1"
        values="7; 18; 7" />
      <animate attributeName="height"
        from="7" dur="0.5s"
        begin="gridSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
        keyTimes="0; 0.6; 1"
        values="7; 18; 7" />
      <animate attributeName="rx"
        from="1" dur="0.5s"
        begin="gridSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.42 0 0.58 1"
        keyTimes="0; 0.6; 1"
        values="1; 2; 1" />
    </rect>
    <!-- Top-right tile moves left and fades during merge -->
    <rect x="14" y="3" width="7" height="7" rx="1" pointer-events="none">
      <animateTransform attributeName="transform" type="translate"
        dur="0.5s"
        begin="gridSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
        keyTimes="0; 0.6; 1"
        values="0 0; -11 0; 0 0" />
      <animate attributeName="opacity"
        dur="0.5s"
        begin="gridSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.42 0 0.58 1"
        keyTimes="0; 0.6; 1"
        values="1; 0; 1" />
    </rect>
    <!-- Bottom-left tile moves up and fades to join primary tile -->
    <rect x="3" y="14" width="7" height="7" rx="1" pointer-events="none">
      <animateTransform attributeName="transform" type="translate"
        dur="0.5s"
        begin="gridSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
        keyTimes="0; 0.6; 1"
        values="0 0; 0 -11; 0 0" />
      <animate attributeName="opacity"
        dur="0.5s"
        begin="gridSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.42 0 0.58 1"
        keyTimes="0; 0.6; 1"
        values="1; 0; 1" />
    </rect>
    <!-- Bottom-right tile moves diagonally and fades to complete merge -->
    <rect x="14" y="14" width="7" height="7" rx="1" pointer-events="none">
      <animateTransform attributeName="transform" type="translate"
        dur="0.5s"
        begin="gridSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
        keyTimes="0; 0.6; 1"
        values="0 0; -11 -11; 0 0" />
      <animate attributeName="opacity"
        dur="0.5s"
        begin="gridSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.42 0 0.58 1"
        keyTimes="0; 0.6; 1"
        values="1; 0; 1" />
    </rect>
  </g>

  </g>
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
</svg>