<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="percent">
<g id="percent-g">
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
  <g pointer-events="none">
    <line  x1="19" y1="5" x2="5" y2="19" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
    <animate attributeName="stroke-dashoffset" values="1; 0; 0" keyTimes="0; 0.6; 1" dur="0.6s" begin="percent-g.mouseover" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" fill="freeze" />
  </line>
  </g>
  <g pointer-events="none">
    <circle  cx="6.5" cy="6.5" r="2.5">
    <animateTransform attributeName="transform" type="scale" values="1 1; 1.15 1.15; 1 1" transform-origin="6.5 6.5" dur="0.5s" begin="percent-g.mouseover" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
  </circle>
  </g>
  <g pointer-events="none">
    <circle  cx="17.5" cy="17.5" r="2.5">
    <animateTransform attributeName="transform" type="scale" values="1 1; 1.15 1.15; 1 1" transform-origin="17.5 17.5" dur="0.5s" begin="percent-g.mouseover" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
  </circle>
  </g>
</g>
</svg>