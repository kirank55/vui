  <rect pointer-events="none" x="3" y="3" width="18" height="18" rx="2" ry="2">
    <animateTransform attributeName="transform" type="rotate" values="0 12 12; 90 12 12; 180 12 12" dur="1s" begin="square-g.mouseover" />
  </rect>

