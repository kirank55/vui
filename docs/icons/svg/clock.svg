<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="clock" id="clockSvg">
<g id="clock-g">
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
  <g pointer-events="none">
    <circle cx="12" cy="12" r="10" />
  </g>
  <g pointer-events="none">
    <line x1="12" y1="6" x2="12" y2="12">
      <animateTransform attributeName="transform" type="rotate" values="0 12 12; 360 12 12" dur="0.8s" begin="clockSvg.mouseover" calcMode="spline" keySplines="0.4 0 0.2 1" />
    </line>
  </g>
  <g pointer-events="none">
    <line x1="12" y1="12" x2="16" y2="14">
      <animateTransform attributeName="transform" type="rotate" values="0 12 12; 45 12 12" dur="0.8s" begin="clockSvg.mouseover" calcMode="spline" keySplines="0.4 0 0.2 1" />
    </line>
  </g>
</g>
</svg>