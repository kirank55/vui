<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="compass">
<g id="compass-g">
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
  <g pointer-events="none">
    <circle  cx="12" cy="12" r="10">
    <animateTransform attributeName="transform" type="scale" values="1 1; 1.15 1.15; 1 1" transform-origin="12 12" dur="0.5s" begin="compass-g.mouseover" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
  </circle>
  </g>
  <g pointer-events="none">
    <polygon  points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76">
    <animate attributeName="opacity" values="1; 0.7; 1" dur="0.4s" begin="compass-g.mouseover" />
  </polygon>
  </g>
</g>
</svg>