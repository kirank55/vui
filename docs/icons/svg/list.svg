<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round" aria-label="list" id="listSvg">
  <g transform="translate(1.5 1.5) scale(0.875)">

  <g>
    <rect  width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
    <!-- bullet dot row 1 -->
    <line pointer-events="none" x1="3" y1="6" x2="3.01" y2="6" />
    <!-- line row 1: draws in first -->
    <line pointer-events="none" x1="8" y1="6" x2="21" y2="6"
      pathLength="1" stroke-dasharray="1" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="1; 0" keyTimes="0; 1"
        dur="0.25s" begin="listSvg.mouseover" fill="freeze"
        calcMode="spline" keySplines="0.4 0 0.2 1" />
    </line>
    <!-- bullet dot row 2 -->
    <line pointer-events="none" x1="3" y1="12" x2="3.01" y2="12" />
    <!-- line row 2: draws in second -->
    <line pointer-events="none" x1="8" y1="12" x2="21" y2="12"
      pathLength="1" stroke-dasharray="1" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="1; 0" keyTimes="0; 1"
        dur="0.25s" begin="listSvg.mouseover + 0.1s" fill="freeze"
        calcMode="spline" keySplines="0.4 0 0.2 1" />
    </line>
    <!-- bullet dot row 3 -->
    <line pointer-events="none" x1="3" y1="18" x2="3.01" y2="18" />
    <!-- line row 3: draws in third -->
    <line pointer-events="none" x1="8" y1="18" x2="21" y2="18"
      pathLength="1" stroke-dasharray="1" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="1; 0" keyTimes="0; 1"
        dur="0.25s" begin="listSvg.mouseover + 0.2s" fill="freeze"
        calcMode="spline" keySplines="0.4 0 0.2 1" />
    </line>
  </g>

  </g>
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
</svg>