<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="bar-chart">
<g id="bar-chart-g">
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
  
  <line pointer-events="none" x1="12" y1="20" x2="12" y2="10">
    <animate attributeName="y2" values="10; 20; 10" dur="0.6s" begin="bar-chart-g.mouseover" />
  </line>
  <line pointer-events="none" x1="18" y1="20" x2="18" y2="4">
    <animate attributeName="y2" values="4; 20; 4" dur="0.6s" begin="bar-chart-g.mouseover" />
  </line>
  <line pointer-events="none" x1="6" y1="20" x2="6" y2="16">
    <animate attributeName="y2" values="16; 20; 16" dur="0.6s" begin="bar-chart-g.mouseover" />
  </line>

</g>
</svg>