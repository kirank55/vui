<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="circle">
<g id="circle-g">
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
  
  <circle pointer-events="none" cx="12" cy="12" r="10">
    <animateTransform attributeName="transform" type="scale" values="1 1; 0.8 0.8; 1 1" transform-origin="12 12" dur="0.5s" begin="circle-g.mouseover" />
    <animate attributeName="stroke" values="currentColor; #f43f5e; currentColor" dur="0.5s" begin="circle-g.mouseover" />
  </circle>

</g>
</svg>