<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="speaker">
<g id="speaker-g">
  <rect width="24" height="24" fill="transparent" stroke="none" pointer-events="all" />
  <g pointer-events="none">
    <rect  x="4" y="2" width="16" height="20" rx="2" ry="2">
    <animate attributeName="opacity" values="1; 0.7; 1" dur="0.4s" begin="speaker-g.mouseover" />
  </rect>
  </g>
  <g pointer-events="none">
    <circle  cx="12" cy="14" r="4">
    <animateTransform attributeName="transform" type="scale" values="1 1; 1.15 1.15; 1 1" transform-origin="12 14" dur="0.5s" begin="speaker-g.mouseover" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
  </circle>
  </g>
  <g pointer-events="none">
    <line  x1="12" y1="6" x2="12.01" y2="6" pathLength="1" stroke-dasharray="1" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="1; 0; 0" keyTimes="0; 0.6; 1" dur="0.6s" begin="speaker-g.mouseover" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" fill="freeze" />
  </line>
  </g>
</g>
</svg>