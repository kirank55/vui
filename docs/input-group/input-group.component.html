<!--
  vui Input Group
  Composed field rows with prepend text, append text, and appended buttons.
  Copy both this HTML and input-group.component.css into your project.
  Source: https://github.com/kirank55/vui
-->
<div class="vui-input-group-stack" role="group" aria-label="Input group examples">
  <label class="vui-input-group">
    <span class="vui-input-group-text">https://</span>
    <input class="vui-input-group-field" type="text" placeholder="project.example" />
  </label>

  <label class="vui-input-group">
    <input class="vui-input-group-field" type="text" placeholder="Search projects" />
    <button class="vui-input-group-button" type="button">Search</button>
  </label>

  <label class="vui-input-group">
    <span class="vui-input-group-text">@</span>
    <input class="vui-input-group-field" type="text" placeholder="team-name" />
    <span class="vui-input-group-text">.workspace</span>
  </label>
</div>
