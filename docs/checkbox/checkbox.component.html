<!--
  vui Checkbox
  Native checkbox group inside a fieldset with legend.
  Copy both this HTML and checkbox.component.css into your project.
  Source: https://github.com/kirank55/vui
-->
<fieldset class="vui-checkbox-group">
  <legend class="vui-checkbox-legend">Notifications</legend>

  <label class="vui-checkbox">
    <input type="checkbox" checked />
    <span>Launch reminders</span>
  </label>

  <label class="vui-checkbox">
    <input type="checkbox" />
    <span>Weekly digest</span>
  </label>

  <label class="vui-checkbox">
    <input type="checkbox" disabled />
    <span>Compliance updates</span>
  </label>
</fieldset>
