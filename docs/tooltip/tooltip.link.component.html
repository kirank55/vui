<div class="vui-tooltip-demo">
  <div class="vui-tooltip-stack vui-tooltip-stack--compact">
    <button
      class="vui-tooltip-trigger vui-tooltip-trigger--bare"
      type="button"
      popovertarget="vui-tooltip-link-panel"
      aria-describedby="vui-tooltip-link-panel"
    >
      Why is this disabled?
    </button>

    <div id="vui-tooltip-link-panel" class="vui-tooltip-bubble vui-tooltip-bubble--link" popover role="tooltip">
      The underline-only trigger keeps native button semantics without adding pill, border, or surface styling.
    </div>
  </div>
</div>
