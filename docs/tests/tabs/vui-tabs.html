<!--
  vui-tabs.html  --  Shadow DOM template for <vui-tabs>
  Fetched and cloned by vui-tabs.js at module load time.
  Tab buttons and panels are injected into the named containers by JS.
-->
<template id="vui-tabs-tmpl">
  <div class="tablist" role="tablist" aria-label="Tabs"></div>
  <div class="panel-wrapper"></div>
</template>
