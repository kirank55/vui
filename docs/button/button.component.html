<!--
  vui Button
  Native button elements with variant and size modifiers.
  Each button works standalone — copy a single <button class="vui-btn ..."> with button.component.css.
  Source: https://github.com/kirank55/vui
-->
<div class="vui-button" role="group">
  <div class="vui-button-stack">
    <div class="vui-button-row">
      <button class="vui-btn vui-btn--primary" type="button">Primary</button>
      <button class="vui-btn vui-btn--secondary" type="button">Secondary</button>
      <button class="vui-btn vui-btn--outline" type="button">Outline</button>
      <button class="vui-btn vui-btn--ghost" type="button">Ghost</button>
      <button class="vui-btn vui-btn--danger" type="button">Danger</button>
    </div>

    <div class="vui-button-row">
      <button class="vui-btn vui-btn--primary vui-btn--sm" type="button">Small</button>
      <button class="vui-btn vui-btn--primary" type="button">Medium</button>
      <button class="vui-btn vui-btn--primary vui-btn--lg" type="button">Large</button>
    </div>
  </div>
</div>
