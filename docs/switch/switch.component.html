<!--
  vui Switch
  A toggle control built from a native checkbox with a CSS-rendered track.
  Copy both this HTML and switch.component.css into your project.
  Source: https://github.com/kirank55/vui
-->
<div class="vui-switch-group" role="group" aria-label="Toggle settings">
  <label class="vui-switch">
    <input type="checkbox" role="switch" checked />
    <span class="vui-switch-control" aria-hidden="true"></span>
    <span class="vui-switch-label">Email alerts</span>
  </label>

  <label class="vui-switch vui-switch--sm">
    <input type="checkbox" role="switch" />
    <span class="vui-switch-control" aria-hidden="true"></span>
    <span class="vui-switch-label">Compact mode</span>
  </label>

  <label class="vui-switch vui-switch--disabled">
    <input type="checkbox" role="switch" checked disabled />
    <span class="vui-switch-control" aria-hidden="true"></span>
    <span class="vui-switch-label">Locked by admin</span>
  </label>
</div>
