<div class="vui-switch-group">
  <label class="vui-switch">
    <input type="checkbox" checked />
    <span class="vui-switch-control" aria-hidden="true"></span>
    <span class="vui-switch-label">Email alerts</span>
  </label>

  <label class="vui-switch vui-switch--sm">
    <input type="checkbox" />
    <span class="vui-switch-control" aria-hidden="true"></span>
    <span class="vui-switch-label">Compact mode</span>
  </label>

  <label class="vui-switch vui-switch--disabled">
    <input type="checkbox" checked disabled />
    <span class="vui-switch-control" aria-hidden="true"></span>
    <span class="vui-switch-label">Locked by admin</span>
  </label>
</div>
